<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PURACERÂMICA — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:     #134E9D;
      --brand-dark:#0D3872;
      --bg:        #F4F6FA;
      --sand:      #C8D4E4;
      --dark:      #0A1E38;
      --muted:     #6B84A3;
    }

    html, body {
      height: 100%;
      background-color: var(--bg);
      color: var(--dark);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      letter-spacing: 0.03em;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 20px;
      border: 1px solid var(--sand);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .ornament {
      width: 48px;
      height: 1px;
      background: var(--brand);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 1s ease 0.2s forwards;
    }

    .brand {
      font-family: 'Cormorant Garant', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 6vw, 4rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dark);
      line-height: 1;
      opacity: 0;
      animation: fadeUp 1s ease 0.4s forwards;
    }

    .tagline {
      margin-top: 0.9rem;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 1s ease 0.6s forwards;
    }

    .divider {
      width: 1px;
      height: 48px;
      background: var(--sand);
      margin: 2.8rem auto;
      opacity: 0;
      animation: fadeUp 1s ease 0.8s forwards;
    }

    .message {
      font-family: 'Cormorant Garant', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-weight: 300;
      color: var(--brand);
      line-height: 1.5;
      opacity: 0;
      animation: fadeUp 1s ease 1s forwards;
    }

    .sub {
      margin-top: 1rem;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 1s ease 1.2s forwards;
    }

    .contact {
      margin-top: 3rem;
      display: flex;
      align-items: center;
      gap: 2rem;
      opacity: 0;
      animation: fadeUp 1s ease 1.4s forwards;
    }

    .contact a {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.3s, border-color 0.3s;
    }

    .contact a:hover {
      color: var(--brand);
      border-bottom-color: var(--brand);
    }

    .contact .sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--sand);
    }

    .location {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--sand);
      white-space: nowrap;
      opacity: 0;
      animation: fadeUp 1s ease 1.6s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      body::after { inset: 12px; }
      .contact { flex-direction: column; gap: 1rem; }
      .contact .sep { display: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="ornament"></div>

    <h1 class="brand">Puracerâmica</h1>
    <p class="tagline">Ceramics &middot; Lisbon</p>

    <div class="divider"></div>

    <p class="message">We are updating our website &mdash;<br>be back soon.</p>

    <nav class="contact" aria-label="Contact links">
      <a href="https://www.instagram.com/puraceramicalisboa/" target="_blank" rel="noopener">Instagram</a>
      <span class="sep" aria-hidden="true"></span>
      <a href="mailto:info@puraceramica.pt">Contact</a>
    </nav>
  </main>

  <p class="location">Rua Jau 23a &middot; Alcântara &middot; Lisbon</p>
</body>
</html>
